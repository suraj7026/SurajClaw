<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}SurajClaw{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #161a22;
      --border: #262b36;
      --text: #e6e8ed;
      --muted: #8a92a6;
      --accent: #4f9eff;
      --accent-bg: #1b2840;
      --danger: #ff5a5f;
      --warn: #ffb648;
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header a { color: var(--muted); text-decoration: none; margin-left: 16px; }
    header a:hover { color: var(--text); }
    main { padding: 24px; max-width: 1000px; margin: 0 auto; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 500; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
    .pill.pending { background: var(--accent-bg); color: var(--accent); }
    .pill.approved { background: rgba(74, 222, 128, 0.15); color: var(--ok); }
    .pill.rejected { background: rgba(255, 90, 95, 0.15); color: var(--danger); }
    .pill.expired { background: rgba(138, 146, 166, 0.15); color: var(--muted); }
    button {
      cursor: pointer; padding: 6px 12px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--panel); color: var(--text);
      font-size: 12px; margin-right: 6px;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.approve { border-color: var(--ok); color: var(--ok); }
    button.deny { border-color: var(--danger); color: var(--danger); }
    .tool-id { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; font-size: 12px; color: var(--accent); }
    .desc { color: var(--muted); font-size: 12px; max-width: 480px; word-break: break-word; }
    .empty { padding: 48px; text-align: center; color: var(--muted); }
    .login-card {
      max-width: 360px; margin: 80px auto; padding: 32px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    }
    .login-card input {
      width: 100%; padding: 10px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      font-size: 14px; margin-bottom: 12px;
    }
    .login-card button { width: 100%; padding: 10px; }
    .err { color: var(--danger); font-size: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>SurajClaw</h1>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'web-approvals' %}">Approvals</a>
        <a href="{% url 'web-logout' %}">Sign out ({{ user.username }})</a>
      {% endif %}
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
