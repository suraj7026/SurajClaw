{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}SurajClaw{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="bg-slate-950 text-slate-100">
    <div class="min-h-screen flex flex-col">
        <header class="px-6 py-4 border-b border-slate-800 flex items-center justify-between">
            <h1 class="text-lg font-semibold tracking-tight">SurajClaw</h1>
            <nav class="text-sm text-slate-400 space-x-4">
                <a href="/" class="hover:text-slate-100">Chat</a>
                <a href="/admin/" class="hover:text-slate-100">Admin</a>
            </nav>
        </header>
        <main class="flex-1 flex flex-col">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
