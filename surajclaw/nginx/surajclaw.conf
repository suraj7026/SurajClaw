# SurajClaw Nginx config
#
# Drop this into /etc/nginx/sites-available/surajclaw.conf on your Ubuntu
# server, symlink to sites-enabled, and reload:
#
#   sudo ln -sf /etc/nginx/sites-available/surajclaw.conf \
#               /etc/nginx/sites-enabled/surajclaw.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS, run `certbot --nginx -d your.domain` after confirming the HTTP
# variant below resolves. Certbot will rewrite this file to add a second
# server block on :443 with the managed certificates.

upstream surajclaw_django {
    # Daphne listens on 127.0.0.1:8000 (see `make dev` / systemd unit).
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name surajclaw.local;  # replace with real hostname in production

    client_max_body_size 25M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # --- Static files ------------------------------------------------------
    location /static/ {
        alias /opt/surajclaw/surajclaw/staticfiles/;
        access_log off;
        expires 30d;
    }

    # --- WebSocket: Django Channels ---------------------------------------
    location /ws/ {
        proxy_pass http://surajclaw_django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WS alive across idle periods.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Webhooks: Telegram, GitHub, Gmail push ---------------------------
    location /webhooks/ {
        proxy_pass http://surajclaw_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- REST API + everything else ---------------------------------------
    location / {
        proxy_pass http://surajclaw_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
