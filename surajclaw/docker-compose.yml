# SurajClaw local dev + single-host production stack.
#
# Intentional choices:
#   - `pgvector/pgvector:pg16` pre-ships the vector extension so migrations
#     `CREATE EXTENSION IF NOT EXISTS vector` just work.
#   - Postgres handles Django data, pgvector memory, Celery broker, and results.
#   - Nginx is expected on the host (systemd-managed), not in this compose.

services:
  # Local Postgres with pgvector baked in. Set POSTGRES_HOST=db in .env to
  # use this over the compose network. To point at a remote Postgres instead,
  # set POSTGRES_HOST to its Tailscale/LAN address in .env (but that remote
  # host MUST have the `vector` extension installed server-side).
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-surajclaw}
      POSTGRES_USER: ${POSTGRES_USER:-surajclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-surajclaw}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - surajclaw_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-surajclaw} -d ${POSTGRES_DB:-surajclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    environment:
      # First-run defaults to dev settings so DEBUG=on and ALLOWED_HOSTS=*.
      # Flip to config.settings.production via your .env when you put nginx
      # in front and have a real DJANGO_SECRET_KEY + ALLOWED_HOSTS.
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      POSTGRES_HOST: db
      # POSTGRES_HOST=db in .env points at the compose Postgres. Override in
      # .env to use a remote Postgres (which must have the `vector` extension).
      CELERY_RESULT_BACKEND: django-db
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./:/app
      - surajclaw_staticfiles:/app/staticfiles
      - surajclaw_notes:/app/notes
    depends_on:
      db:
        condition: service_healthy

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      POSTGRES_HOST: db
      CELERY_RESULT_BACKEND: django-db
    env_file:
      - ../.env
    volumes:
      - ./:/app
      - surajclaw_notes:/app/notes
    depends_on:
      db:
        condition: service_healthy

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      POSTGRES_HOST: db
      CELERY_RESULT_BACKEND: django-db
    env_file:
      - ../.env
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy

  # React dashboard. Default `dev` target runs Vite with HMR; override the
  # build target to `nginx` for a production image (and bind to 80/443 behind
  # your real nginx instead of mapping the dev port).
  #
  # The browser hits `http://localhost:${UI_HOST_PORT}` and Vite's dev-server
  # proxy forwards /api + /ws + /admin + /static to the `web` container over
  # the compose network (see VITE_PROXY_TARGET). VITE_API_BASE_URL is left
  # blank on purpose so the browser uses same-origin relative URLs.
  ui:
    build:
      context: ./ui
      target: dev
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://web:8000}
      VITE_API_BASE_URL: ""
      VITE_WS_BASE_URL: ""
    ports:
      # Override `UI_HOST_PORT` in .env if 5173 is already taken on the host
      # (e.g. another Vite project or a stray container).
      - "127.0.0.1:${UI_HOST_PORT:-5173}:5173"
    volumes:
      - ./ui:/app
      - surajclaw_ui_node_modules:/app/node_modules
    depends_on:
      - web

volumes:
  surajclaw_pgdata:
  surajclaw_staticfiles:
  surajclaw_notes:
  surajclaw_ui_node_modules:
